name: Build, Test & Push — Frugalia

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'b[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG:  ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

  # Docker Hub
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_REGISTRY: docker.io

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  build:
    name: Build — ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frugalia-mcp
            context: .
            dockerfile: Dockerfile
          - image: kagent-cmd
            context: kagent-cmd
            dockerfile: kagent-cmd/Dockerfile
          - image: event-driven-webhook
            context: event-driven-webhook
            dockerfile: event-driven-webhook/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          tags: |
            ${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.image }}
          outputs:    type=docker,dest=/tmp/${{ matrix.image }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name:           docker-image-${{ matrix.image }}
          path:           /tmp/${{ matrix.image }}.tar
          retention-days: 1

  scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy — filesystem (vulnerability + misconfig)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:      fs
          scan-ref:       .
          scanners:       vulnerability,misconfig
          severity:       CRITICAL,HIGH
          ignore-unfixed: true
          exit-code:      '1'
          format:         table

      - name: Trivy — secret scan on repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:  fs
          scan-ref:   .
          scanners:   secret
          format:     table
          exit-code:  '1'

      - name: Download frugalia-mcp image
        uses: actions/download-artifact@v6
        with:
          name: docker-image-frugalia-mcp
          path: /tmp

      - name: Download kagent-cmd image
        uses: actions/download-artifact@v6
        with:
          name: docker-image-kagent-cmd
          path: /tmp

      - name: Download event-driven-webhook image
        uses: actions/download-artifact@v6
        with:
          name: docker-image-event-driven-webhook
          path: /tmp

      - name: Load images
        run: |
          docker load --input /tmp/frugalia-mcp.tar
          docker load --input /tmp/kagent-cmd.tar
          docker load --input /tmp/event-driven-webhook.tar

      - name: Trivy — scan frugalia-mcp image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      'frugalia-mcp:${{ env.IMAGE_TAG }}'
          format:         table
          severity:       CRITICAL
          ignore-unfixed: true
          exit-code:      '1'

      - name: Trivy — scan kagent-cmd image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      'kagent-cmd:${{ env.IMAGE_TAG }}'
          format:         table
          severity:       CRITICAL
          ignore-unfixed: true
          exit-code:      '1'

      - name: Trivy — scan event-driven-webhook image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      'event-driven-webhook:${{ env.IMAGE_TAG }}'
          format:         table
          severity:       CRITICAL
          ignore-unfixed: true
          exit-code:      '1'

  push-dockerhub:
    name: Push → Docker Hub — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref_type == 'tag' || github.ref_name == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frugalia-mcp
          - image: kagent-cmd
          - image: event-driven-webhook

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-image-${{ matrix.image }}
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/${{ matrix.image }}.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & Push to Docker Hub
        run: |
          DH_IMAGE=${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          docker tag ${{ matrix.image }}:${{ env.IMAGE_TAG }} ${DH_IMAGE}:${{ env.IMAGE_TAG }}
          docker tag ${{ matrix.image }}:${{ env.IMAGE_TAG }} ${DH_IMAGE}:latest
          docker push ${DH_IMAGE}:${{ env.IMAGE_TAG }}
          docker push ${DH_IMAGE}:latest
