apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: frugalia-mcp
  namespace: kagent
  labels:
    kagent.dev/discovery: disabled
spec:
  transportType: stdio
  deployment:
    image: salvadorarreola/frugalia-mcp:b0.0.1
    cmd: "python"
    args:
    - "src/main.py"
    port: 3000
    env:
      PROMETHEUS_URL: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"
